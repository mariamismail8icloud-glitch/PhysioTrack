<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>PhysioTrack • Messages</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<header class="header">
  <div class="header-inner">
    <div class="brand">
      <div class="brand-mark">∿</div>
      <div class="brand-title">
        <b>Messages</b>
        <span>Clinician ↔ Patient communication</span>
      </div>
    </div>
    <div class="header-actions">
      <div class="pill">View: <b id="deviceHint">Laptop</b></div>
      <button class="icon-btn" id="btnTheme">Theme: <b id="themeLabel">Light</b></button>
    </div>
  </div>
</header>

<div class="shell">
  <aside class="sidebar">
    <nav class="nav">
      <a data-nav href="index.html">🏠 Dashboard</a>
      <a data-nav href="patients.html">👥 Patients</a>
      <a data-nav href="exercises.html">🧩 Exercises</a>
      <a data-nav href="messages.html" class="active">💬 Messages</a>
      <a data-nav href="reports.html">📄 Reports</a>
    </nav>
  </aside>

  <main class="main">
    <section class="msg-layout">
      <div class="card">
        <h2 class="section-title">Inbox</h2>
        <div style="height:10px"></div>
        <div id="inboxList" style="display:grid;gap:10px"></div>
      </div>

      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;gap:10px">
          <h2 class="section-title" id="chatTitle">—</h2>
          <a class="btn" href="patients.html">Open patient</a>
        </div>

        <div style="height:12px"></div>
        <div class="thread" id="thread"></div>

        <div class="chat-input">
          <input id="chatText" placeholder="Type your message..." />
          <button class="btn primary" id="btnSend">Send</button>
        </div>
      </div>
    </section>
  </main>
</div>

<nav class="mobile-nav">
  <div class="tabs">
    <a data-nav href="index.html">🏠<div>Home</div></a>
    <a data-nav href="patients.html">👥<div>Patients</div></a>
    <a data-nav href="exercises.html">🧩<div>Plans</div></a>
    <a data-nav href="messages.html" class="active">💬<div>Chat</div></a>
    <a data-nav href="reports.html">📄<div>Reports</div></a>
  </div>
</nav>

<script type="module" src="js/app.js"></script>
</body>
</html>
