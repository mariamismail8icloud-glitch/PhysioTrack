<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>PhysioTrack • Reports</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    /* Print styling */
    @media print{
      .sidebar,.mobile-nav,.header .header-actions,#btnPrint{ display:none !important; }
      body{ background:#fff; }
      .shell{ display:block; padding:0; }
      .main{ padding:0; }
      .card{ box-shadow:none !important; }
    }
  </style>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <div class="brand">
      <div class="brand-mark">∿</div>
      <div class="brand-title">
        <b>Reports</b>
        <span>Weekly summary and patient overview</span>
      </div>
    </div>
    <div class="header-actions">
      <button class="icon-btn" id="btnTheme">Theme: <b id="themeLabel">Light</b></button>
      <button class="icon-btn" id="btnPrint">Print / Save as PDF</button>
    </div>
  </div>
</header>

<div class="shell">
  <aside class="sidebar">
    <nav class="nav">
      <a data-nav href="index.html">🏠 Dashboard</a>
      <a data-nav href="patients.html">👥 Patients</a>
      <a data-nav href="exercises.html">🧩 Exercises</a>
      <a data-nav href="messages.html">💬 Messages</a>
      <a data-nav href="reports.html" class="active">📄 Reports</a>
    </nav>
  </aside>

  <main class="main">
    <div id="reportSummary"></div>

    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;gap:10px">
        <h2 class="section-title">Patient Summary</h2>
        <div class="pill">Generated: <b id="deviceHint">—</b></div>
      </div>

      <div style="height:12px"></div>

      <table class="table">
        <thead>
          <tr>
            <th>Patient</th>
            <th>Status</th>
            <th>Progress</th>
            <th>Pain</th>
            <th>Compliance</th>
            <th>Device</th>
          </tr>
        </thead>
        <tbody id="reportTableBody"></tbody>
      </table>
    </div>
  </main>
</div>

<nav class="mobile-nav">
  <div class="tabs">
    <a data-nav href="index.html">🏠<div>Home</div></a>
    <a data-nav href="patients.html">👥<div>Patients</div></a>
    <a data-nav href="exercises.html">🧩<div>Plans</div></a>
    <a data-nav href="messages.html">💬<div>Chat</div></a>
    <a data-nav href="reports.html" class="active">📄<div>Reports</div></a>
  </div>
</nav>

<script type="module" src="js/app.js"></script>
</body>
</html>
